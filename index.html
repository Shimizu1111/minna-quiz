<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みんなのクイズ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">

    <!-- スタート画面 -->
    <section id="start-screen" class="screen">
      <h1 class="title">みんなのクイズ</h1>
      <p class="subtitle">教科をえらんでスタート！</p>

      <div id="category-list" class="category-list">
        <!-- カテゴリのボタンはJSで作ります -->
      </div>
    </section>

    <!-- 問題画面 -->
    <section id="quiz-screen" class="screen hidden">
      <header class="quiz-header">
        <span id="progress" class="progress">1 / 10</span>
        <span id="score" class="score">0問正解</span>
      </header>

      <div class="bar"><div id="bar-fill" class="bar-fill"></div></div>

      <h2 id="question" class="question">ここに問題が出ます</h2>

      <div id="choices" class="choices">
        <!-- 選択肢ボタンはJSで作ります -->
      </div>

      <div id="feedback" class="feedback hidden"></div>

      <button id="next-btn" class="next-btn hidden">つぎへ →</button>
    </section>

    <!-- 結果画面 -->
    <section id="result-screen" class="screen hidden">
      <h1 class="title">けっか発表！</h1>
      <p id="result-emoji" class="result-emoji">🎉</p>
      <p id="result-text" class="result-text"></p>
      <button id="retry-btn" class="next-btn">もう一度あそぶ</button>
    </section>

  </main>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
